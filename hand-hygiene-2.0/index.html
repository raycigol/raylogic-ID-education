<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洗手五時機 · 情境判斷測驗</title>
<style>
  :root{
    --bg:#F1F6F5; --ink:#12332E; --teal:#0E7C66; --teal-dark:#0A5B4C;
    --amber:#E8A93C; --red:#C9463D; --slate:#5A6E6A; --card:#FFFFFF; --line:#C8DAD6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:repeating-linear-gradient(90deg, transparent 0 46px, rgba(14,124,102,.045) 46px 47px), var(--bg);
    color:var(--ink);display:flex;justify-content:center;min-height:100%;padding:20px 14px 48px;
  }
  .app{width:100%;max-width:640px;}

  header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .cross{width:34px;height:34px;border-radius:8px;background:var(--teal);position:relative;flex:none;}
  .cross::before,.cross::after{content:"";position:absolute;background:#fff;border-radius:2px;left:50%;top:50%;transform:translate(-50%,-50%);}
  .cross::before{width:18px;height:6px;}
  .cross::after{width:6px;height:18px;}
  h1{font-size:20px;font-weight:900;letter-spacing:.08em;}
  header small{display:block;font-size:12px;color:var(--teal);letter-spacing:.25em;font-weight:700;}

  .progress{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap;}
  .progress span{flex:1 1 12px;height:6px;border-radius:3px;background:#D8E6E3;transition:background .3s;}
  .progress span.done{background:var(--teal);}
  .progress span.wrong{background:var(--red);}
  .progress span.now{background:var(--amber);}

  .hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:900;font-size:14px;gap:8px;flex-wrap:wrap;}
  .hud .pts{color:var(--teal-dark);font-size:18px;}
  .hud .lvltag{font-size:12px;letter-spacing:.1em;padding:3px 10px;border-radius:99px;background:var(--ink);color:#fff;}
  .hud .lvltag.adv{background:var(--red);}
  .hud .lvltag.mix{background:var(--amber);color:var(--ink);}
  .hud .lvltag.gen{background:var(--teal);}
  .hud .streak{color:var(--amber);}
  .hud .streak.off{color:#B9CCC8;}

  .timerwrap{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .timernum{flex:none;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;background:var(--teal);transition:background .3s, transform .15s;}
  .timernum.hurry{background:var(--amber);}
  .timernum.panic{background:var(--red);animation:pulse .5s infinite alternate;}
  @keyframes pulse{from{transform:scale(1);}to{transform:scale(1.12);}}
  .timerbar{flex:1;height:14px;border-radius:7px;background:#D8E6E3;overflow:hidden;}
  .timerbar i{display:block;height:100%;background:var(--teal);border-radius:7px;transform-origin:left;transition:background .3s;}
  .timerbar i.hurry{background:var(--amber);}
  .timerbar i.panic{background:var(--red);}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:24px 22px;box-shadow:0 3px 0 rgba(18,51,46,.08);}
  .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--teal);border:1.5px dashed var(--teal);border-radius:99px;padding:3px 12px;margin-bottom:12px;}
  .scene{font-size:17px;line-height:1.85;font-weight:500;}
  .scene b{background:linear-gradient(transparent 62%, rgba(232,169,60,.45) 62%);font-weight:700;}
  .q{margin-top:14px;font-size:15px;font-weight:800;color:var(--teal-dark);}

  .opts{display:flex;flex-direction:column;gap:9px;margin-top:18px;}
  .opt{--c:var(--ink);position:relative;border:none;cursor:pointer;text-align:left;font:inherit;font-size:15px;font-weight:700;letter-spacing:.05em;color:#fff;background:var(--c);padding:12px 34px 12px 18px;clip-path:polygon(0 0, calc(100% - 20px) 0, 100% 50%, calc(100% - 20px) 100%, 0 100%);transition:transform .12s, opacity .2s, background .2s;}
  .opt.none{--c:var(--slate);}
  .opt.yes{--c:var(--teal);}
  .opt:hover:not(:disabled){transform:translateX(6px);}
  .opt:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}
  .opt:disabled{cursor:default;}
  .opt.correct{--c:var(--teal);}
  .opt.picked-wrong{--c:var(--red);}
  .opt.dim{opacity:.32;}

  .feedback{margin-top:16px;border-radius:12px;padding:14px 16px;font-size:14.5px;line-height:1.8;display:none;}
  .feedback.show{display:block;animation:pop .25s ease;}
  .feedback.good{background:#E4F2EE;border:1.5px solid var(--teal);}
  .feedback.bad{background:#FBEAE8;border:1.5px solid var(--red);}
  .feedback .verdict{font-weight:900;font-size:16px;display:block;margin-bottom:4px;}
  .good .verdict{color:var(--teal-dark);}
  .bad .verdict{color:var(--red);}
  .gain{display:inline-block;margin-left:8px;font-size:14px;font-weight:900;color:var(--amber);animation:rise .5s ease;}
  @keyframes rise{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @keyframes pop{from{transform:scale(.97);opacity:0;}to{transform:scale(1);opacity:1;}}

  .next{margin-top:16px;width:100%;padding:14px;border:none;border-radius:12px;background:var(--ink);color:#fff;font:inherit;font-size:16px;font-weight:800;letter-spacing:.15em;cursor:pointer;display:none;}
  .next.show{display:block;}
  .next:hover{background:var(--teal-dark);}

  .zone{border:2px dashed var(--teal);border-radius:20px;padding:16px 18px;margin:16px 0;font-size:14px;line-height:1.9;background:rgba(255,255,255,.6);}
  .zone strong{color:var(--teal-dark);}

  .idbox{margin:16px 0;}
  .idbox label{display:block;font-size:13px;font-weight:800;color:var(--teal-dark);margin:0 0 5px 2px;}
  .idbox input{width:100%;padding:12px 14px;border:2px solid var(--line);border-radius:12px;font:inherit;font-size:15px;margin-bottom:12px;background:#fff;color:var(--ink);}
  .idbox input:focus{outline:none;border-color:var(--teal);}
  .idwarn{color:var(--red);font-size:13px;font-weight:700;margin:-4px 0 10px 2px;display:none;}
  .idwarn.show{display:block;}

  .levels{display:flex;flex-direction:column;gap:12px;margin:8px 0 4px;}
  .lvl{border:2px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;background:#fff;text-align:left;font:inherit;transition:transform .12s, border-color .2s;}
  .lvl:hover{transform:translateY(-2px);}
  .lvl:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}
  .lvl .lname{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;}
  .lvl .ldesc{font-size:13.5px;color:var(--slate);margin-top:5px;line-height:1.7;}
  .lvl.aud1{border-color:var(--teal);}
  .lvl.aud1 .lname{color:var(--teal-dark);}
  .lvl.aud2{border-color:var(--ink);}
  .lvl.aud2 .lname{color:var(--ink);}
  .lvl.basic{border-color:var(--teal);}
  .lvl.basic .lname{color:var(--teal-dark);}
  .lvl.adv{border-color:var(--red);}
  .lvl.adv .lname{color:var(--red);}
  .lvl.mix{border-color:var(--amber);}
  .lvl.mix .lname{color:#B47A10;}
  .lvl .count{margin-left:auto;font-size:12px;font-weight:700;color:var(--slate);letter-spacing:.05em;}

  .score{text-align:center;padding:10px 0 4px;}
  .score .n{font-size:56px;font-weight:900;color:var(--teal);line-height:1;}
  .score .n small{font-size:18px;color:var(--ink);}
  .score .sub{font-size:15px;margin-top:6px;font-weight:700;}
  .score .rank{font-size:20px;font-weight:900;margin-top:10px;}
  .review{margin-top:16px;font-size:13px;line-height:1.7;}
  .review li{margin:7px 0 7px 18px;}
  .review .ok{color:var(--teal-dark);}
  .review .ng{color:var(--red);}

  .record{background:#F3F8F7;border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:16px;font-size:13px;line-height:1.9;}
  .record b{color:var(--teal-dark);}
  .btnrow{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .big-btn{width:100%;padding:15px;border:none;border-radius:12px;background:var(--teal);color:#fff;font:inherit;font-size:16px;font-weight:900;letter-spacing:.12em;cursor:pointer;}
  .big-btn:hover{background:var(--teal-dark);}
  .big-btn:disabled{background:#9DBDB6;cursor:default;}
  .ghost-btn{width:100%;padding:13px;border:2px solid var(--teal);border-radius:12px;background:#fff;color:var(--teal-dark);font:inherit;font-size:15px;font-weight:800;cursor:pointer;}
  .ghost-btn:hover{background:#EAF4F1;}
  .backbtn{width:100%;margin-top:4px;padding:12px;border:2px solid var(--line);border-radius:12px;background:#fff;font:inherit;font-size:14px;font-weight:800;color:var(--slate);cursor:pointer;}
  .backbtn:hover{border-color:var(--teal);color:var(--teal-dark);}
  .status{margin-top:10px;font-size:13.5px;font-weight:700;text-align:center;min-height:20px;}
  .status.ok{color:var(--teal-dark);}
  .status.err{color:var(--red);}
  .status.pending{color:var(--amber);}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="cross" aria-hidden="true"></div>
    <div>
      <h1>洗手時機 · 情境判斷測驗</h1>
      <small>HAND HYGIENE QUIZ</small>
    </div>
  </header>

  <div class="progress" id="progress" hidden></div>
  <div class="hud" id="hud" hidden>
    <span class="pts">🏅 <span id="ptsNum">0</span> 分</span>
    <span class="lvltag" id="lvlTag">基礎</span>
    <span class="streak off" id="streakBox">🔥 ×<span id="streakNum">0</span></span>
  </div>
  <div class="timerwrap" id="timerwrap" hidden>
    <div class="timernum" id="timernum">20</div>
    <div class="timerbar"><i id="timerbarfill"></i></div>
  </div>
  <div class="card" id="stage"></div>
</div>

<script>
/* ============================================================ 設定區 ============================================================ */
const TIME_LIMIT   = 20;
const BASE_POINTS  = 1000;
const STREAK_BONUS = 100;
const ROUND        = 10;
const QUIZ_VERSION = "v5.0 (2026-07)";
// ★ 貼上 Google Apps Script 網頁應用程式網址（/exec 結尾）。留空則只提供 CSV 下載。
const SHEET_WEBAPP_URL = "";
/* ============================================================ */

// 醫療人員：五時機 + 不需（索引 0-5）
const OPTIONS_MED = ["① 接觸病人前","② 清潔／無菌技術前","③ 血體液曝觸風險後","④ 接觸病人後","⑤ 接觸病人環境後","✋ 此情境暫不需執行手部衛生"];
const SHORT_MED   = ["①","②","③","④","⑤","不需"];
// 非醫療人員：二選一
const OPTIONS_GEN = ["✅ 需要洗手","✋ 暫時不需要洗手"];
const SHORT_GEN   = ["需洗","不需"];

function optionsFor(aud){return aud==="gen"?OPTIONS_GEN:OPTIONS_MED;}
function shortFor(aud,i){
  if(i===-1) return "逾時";
  return (aud==="gen"?SHORT_GEN:SHORT_MED)[i]||"?";
}

/* ---------- 醫療人員題庫（lv:1 基礎 / lv:2 進階） ---------- */
const Q_MED = [
  {lv:1, tag:"病房 · 晨間護理", scene:"你走進 3 床病房，準備<b>為陳伯伯測量血壓與體溫</b>，手才剛放上血壓計壓脈帶。", q:"在碰到陳伯伯之前，這屬於哪個時機？", ans:0,
   why:"即將接觸病人皮膚或衣物之前，必須執行手部衛生（時機①），保護病人不被醫療人員手上的微生物移生。"},
  {lv:1, tag:"護理站 → 病房", scene:"你在護理站打完紀錄，接著要<b>進病房攙扶王先生下床走路</b>做復健活動。", q:"攙扶病人之前，屬於哪個時機？", ans:0,
   why:"攙扶、握手、身體檢查等任何直接接觸之前皆為時機①。伸手接觸病人前就該完成手部衛生。"},
  {lv:1, tag:"病房 · 協助進食", scene:"午餐送到，你準備<b>親手餵臥床的李奶奶吃飯</b>，正要扶起她的頭部與遞湯匙。", q:"開始餵食前屬於哪個時機？", ans:0,
   why:"協助進食會直接接觸病人，屬於時機①。這類日常照護接觸最常被忽略，卻是病人取得手部微生物的重要途徑。"},
  {lv:1, tag:"治療室 · 靜脈注射", scene:"你已完成評估，接著要<b>為病人放置靜脈留置針</b>，正準備打開無菌包並戴上手套。", q:"戴手套執行侵入性技術之前，屬於哪個時機？", ans:1,
   why:"執行任何清潔／無菌操作之前為時機②——即使會戴手套，戴手套前仍須先洗手，手套不能取代手部衛生。"},
  {lv:1, tag:"病房 · 口腔照護", scene:"你準備<b>為插管病人執行口腔清潔</b>，即將把棉棒與清潔用具伸入病人口腔。", q:"接觸黏膜的清潔操作前屬於哪個時機？", ans:1,
   why:"口腔、眼睛等黏膜屬易受感染部位，執行此類清潔／護理前為時機②，先洗手再操作。"},
  {lv:1, tag:"病房 · 點眼藥", scene:"醫囑要為病人<b>點眼藥水</b>，你準備翻開病人下眼瞼滴藥。", q:"點眼藥之前屬於哪個時機？", ans:1,
   why:"點眼藥、滴耳劑等接觸黏膜的給藥屬清潔／無菌操作，操作前為時機②。"},
  {lv:1, tag:"病房 · 導尿管照護", scene:"你替病人<b>倒完尿袋</b>，過程中雖有戴手套，脫下手套後準備做下一件事。", q:"此刻應執行哪個時機？", ans:2,
   why:"接觸體液（尿液、分泌物、痰液等）之後為時機③，且脫除手套後仍須洗手——手套可能有微小破損或脫除時汙染雙手。"},
  {lv:1, tag:"病房 · 抽痰", scene:"你為氣切病人<b>執行抽痰</b>，抽吸出不少痰液，操作結束脫除手套。", q:"抽痰完成後屬於哪個時機？", ans:2,
   why:"抽痰會接觸呼吸道分泌物，操作後為時機③。此時機優先於「接觸病人後」，因為體液曝觸的感染風險最高。"},
  {lv:1, tag:"病房 · 排泄照護", scene:"你協助病人使用便盆，<b>清理並倒掉含有糞便的便盆</b>後脫除手套。", q:"處理排泄物之後屬於哪個時機？", ans:2,
   why:"接觸糞便等體液後為時機③，務必在脫手套後立即洗手，避免腸道病原（如困難梭菌）擴散。"},
  {lv:1, tag:"病房 · 翻身擺位", scene:"你和同事協助臥床的林奶奶<b>翻身並拍背</b>，完成後你準備離開病房去照顧下一位病人。", q:"離開前應執行哪個時機？", ans:3,
   why:"直接接觸病人之後、離開病人區之前為時機④，避免把病人身上的微生物帶給自己與後續的病人。"},
  {lv:1, tag:"病房 · 訪視結束", scene:"你替病人<b>聽診心肺音並觸診腹部</b>後結束訪視，脫下聽診器準備離開。", q:"此時應執行哪個時機？", ans:3,
   why:"身體評估屬於直接接觸病人，結束後離開病人區前為時機④。別忘了聽診器等共用儀器也應一併清消。"},
  {lv:1, tag:"病房 · 設備調整", scene:"你進入病房<b>調整點滴幫浦速率並更換床尾紀錄板</b>，全程沒有碰到病人本人，接著走出病房。", q:"這種情況離開時屬於哪個時機？", ans:4,
   why:"只接觸病人周遭環境與設備（床欄、幫浦、床旁桌）而未接觸病人，離開時為時機⑤——病人環境同樣布滿病人的菌叢。"},
  {lv:1, tag:"病室整理", scene:"病人已由家屬陪同去做檢查。你進入空病室<b>更換床單、整理床旁桌與呼叫鈴</b>後離開。", q:"病人不在場，離開時屬於哪個時機？", ans:4,
   why:"即使病人不在現場，床單、床旁桌、呼叫鈴都屬於病人環境，接觸後離開仍為時機⑤。"},

  {lv:2, tag:"換藥車 · 傷口護理", scene:"你剛量完病人的生命徵象，接下來要<b>直接為同一位病人更換腹部傷口敷料</b>。", q:"從一般接觸轉換到傷口護理之間，需要哪個時機？", ans:1,
   why:"即使是同一位病人，從「一般接觸」轉為「清潔／無菌操作」之間仍須執行時機②，避免把病人自身其他部位的菌帶進傷口。"},
  {lv:2, tag:"病人回床 · 測血糖", scene:"病人做完檢查回到病房，你先<b>整理好凌亂的床單</b>，接著要<b>為他指尖採血測血糖</b>。", q:"在採血之前屬於哪個時機？", ans:1,
   why:"剛接觸床單（病人環境）後，接著要做指尖採血這種清潔／無菌操作，採血前為時機②——不要讓剛摸過環境的手直接進行侵入操作。"},
  {lv:2, tag:"急診 · 抽血檢驗", scene:"抽血時病人突然移動，<b>少量血液沾到你的手套</b>。你完成止血、脫除手套。", q:"脫除手套後，這屬於哪個時機？", ans:2,
   why:"有血液曝觸風險之後為時機③。就算血液只沾到手套、看似沒碰到皮膚，脫手套後仍必須立即洗手。"},
  {lv:2, tag:"接觸隔離病室", scene:"你在接觸隔離病室<b>為病人翻身檢查壓瘡（未接觸體液）</b>後，走到門邊<b>脫下隔離衣與手套</b>準備離室。", q:"這個情境的手部衛生屬於哪個時機？", ans:3,
   why:"手部衛生的時機由「接觸病人」決定——你翻身檢查了病人，因此屬於時機④。脫隔離衣／手套只是動作，脫除後別忘了仍要洗手。"},
  {lv:2, tag:"病房 · 更衣協助", scene:"你<b>協助病人換好乾淨的病人服</b>（未接觸到體液），扣好鈕扣後準備離開。", q:"協助更衣完成後屬於哪個時機？", ans:3,
   why:"協助更衣是直接接觸病人，若未涉及體液，離開前為時機④（接觸病人後），而非血體液曝觸後。"},
  {lv:2, tag:"手套迷思 · 換病人", scene:"照顧完 A 床後，你想節省時間，打算<b>不洗手、直接換上一副新手套就去照顧 B 床</b>病人。", q:"在接觸 B 床病人前，正確作法對應哪個時機？", ans:0,

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function poolIndices(aud, level){
  if(aud==="gen") return [...Q_GEN.keys()];
  return [...Q_MED.keys()].filter(i=>level===0||Q_MED[i].lv===level);
}

function startGame(aud, level){
  curAudience=aud; curLevel=level;
  bank = aud==="gen" ? Q_GEN : Q_MED;
  const pool=poolIndices(aud, level);
  order=shuffle(pool).slice(0,Math.min(ROUND,pool.length));
  idx=0;correctCount=0;points=0;streak=0;results=[];gains=[];picks=[];
  quizStartMs=Date.now();
  const tagText = aud==="gen" ? "非醫療" : LEVEL_META[level].label;
  const tagCls  = aud==="gen" ? "gen" : LEVEL_META[level].cls;
  lvlTag.textContent=tagText; lvlTag.className="lvltag "+tagCls;
  progress.hidden=false; hud.hidden=false;
  progress.innerHTML=order.map(()=>"<span></span>").join("");
  updateHud();
  renderQ();
}

function updateHud(){
  document.getElementById("ptsNum").textContent=points;
  document.getElementById("streakNum").textContent=streak;
  document.getElementById("streakBox").classList.toggle("off",streak===0);
}

function startTimer(){
  answered=false; deadline=Date.now()+TIME_LIMIT*1000; timerwrap.hidden=false;
  paintTimer(TIME_LIMIT*1000);
  clearInterval(timerId);
  timerId=setInterval(()=>{
    const ms=Math.max(0,deadline-Date.now());
    paintTimer(ms);
    if(ms<=0){clearInterval(timerId); if(!answered) timeUp();}
  },100);
}
function paintTimer(ms){
  const sec=Math.ceil(ms/1000);
  timernum.textContent=sec;
  timerfill.style.transform=`scaleX(${ms/(TIME_LIMIT*1000)})`;
  const state = sec<=5 ? "panic" : sec<=10 ? "hurry" : "";
  timernum.className="timernum "+state; timerfill.className=state;
}

function renderQ(){
  const q=bank[order[idx]];
  const opts=optionsFor(curAudience);
  [...progress.children].forEach((s,i)=>{s.className = i<idx ? (results[i]?"done":"wrong") : (i===idx?"now":"");});
  const noneIdx = curAudience==="gen" ? 1 : 5;   // 灰色「不需」選項
  const yesIdx  = curAudience==="gen" ? 0 : -1;   // 綠色「需要洗手」
  stage.innerHTML=`
    <span class="tag">情境 ${idx+1}／${order.length} · ${q.tag}</span>
    <p class="scene">${q.scene}</p>
    <p class="q">${q.q}</p>
    <div class="opts">
      ${opts.map((m,i)=>`<button class="opt ${i===noneIdx?"none":""} ${i===yesIdx?"yes":""}" data-i="${i}" onclick="pick(${i})">${m}</button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next" id="next" onclick="nextQ()">${idx===order.length-1?"看成績 →":"下一題 →"}</button>
  `;
  startTimer();
}

function lockOptions(pickedIdx, ansIdx){
  document.querySelectorAll(".opt").forEach(btn=>{
    const bi=+btn.dataset.i; btn.disabled=true;
    if(bi===ansIdx) btn.classList.add("correct");
    else if(bi===pickedIdx) btn.classList.add("picked-wrong");
    else btn.classList.add("dim");
  });
}

function pick(i){
  if(answered) return;
  answered=true; clearInterval(timerId);
  const q=bank[order[idx]];
  const good=i===q.ans;
  const msLeft=Math.max(0,deadline-Date.now());
  let gain=0;
  if(good){
    correctCount++; streak++;
    const speedScore=Math.round(BASE_POINTS*(1-((TIME_LIMIT*1000-msLeft)/(TIME_LIMIT*1000))/2));
    gain=speedScore+(streak-1)*STREAK_BONUS; points+=gain;
  }else{streak=0;}
  results[idx]=good; gains[idx]=gain; picks[idx]=i;
  updateHud(); lockOptions(i,q.ans);
  const opts=optionsFor(curAudience);
  const fb=document.getElementById("fb");
  fb.className="feedback show "+(good?"good":"bad");
  fb.innerHTML=`<span class="verdict">${good
    ?`✔ 答對了！<span class="gain">+${gain} 分${streak>1?`（含連答 🔥×${streak}）`:""}</span>`
    :"✘ 正確答案是「"+opts[q.ans]+"」"}</span>${q.why}`;
  document.getElementById("next").classList.add("show");
}

function timeUp(){
  answered=true;
  const q=bank[order[idx]];
  const opts=optionsFor(curAudience);
  streak=0; results[idx]=false; gains[idx]=0; picks[idx]=-1;
  updateHud(); lockOptions(-1,q.ans);
  const fb=document.getElementById("fb");
  fb.className="feedback show bad";
  fb.innerHTML=`<span class="verdict">⏰ 時間到！正確答案是「${opts[q.ans]}」</span>${q.why}`;
  document.getElementById("next").classList.add("show");
  [...progress.children][idx].className="wrong";
}

function nextQ(){ idx++; if(idx<order.length) renderQ(); else renderEnd(); }

function pad(n){return String(n).padStart(2,"0");}
function fmtDateTime(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}

function buildRecord(){
  const elapsedSec=Math.round((Date.now()-quizStartMs)/1000);
  const wrongs=order.map((qi,i)=>({q:bank[qi],ok:results[i],pick:picks[i]}))
                    .filter(x=>!x.ok)
                    .map(x=>`${x.q.tag}(應${shortFor(curAudience,x.q.ans)}／選${shortFor(curAudience,x.pick)})`);
  const wrongSummary = wrongs.length? wrongs.join("；") : "全部答對";
  const audienceLabel = curAudience==="gen" ? "非醫療人員" : "醫療人員";
  const difficulty = curAudience==="gen" ? "一般" : LEVEL_META[curLevel].label;
  return {
    "姓名": student.name,
    "員工號/身分證字號": student.id,
    "分數": points,
    "題數": order.length,
    "答對題數": correctCount,
    "答錯統計": wrongSummary,
    "作答時間": fmtDateTime(new Date()),
    "作答秒數": elapsedSec,
    "題庫版本": QUIZ_VERSION,
    "難度": difficulty,
    "身份": audienceLabel,
  };
}

const COLS=["姓名","員工號/身分證字號","分數","題數","答對題數","答錯統計","作答時間","作答秒數","題庫版本","難度","身份"];

function renderEnd(){
  clearInterval(timerId); timerwrap.hidden=true;
  const ratio=correctCount/order.length;
  const ranks = curAudience==="gen" ? RANKS_GEN : RANKS_MED;
  const r=ranks.find(x=>ratio>=x.p);
  const rec=buildRecord();
  attempts.push(rec);
  const opts=optionsFor(curAudience);
  const list=order.map((qi,i)=>({q:bank[qi],ok:results[i],g:gains[i]}));
  const configured = SHEET_WEBAPP_URL && SHEET_WEBAPP_URL.indexOf("http")===0;
  stage.innerHTML=`
    <span class="tag">測驗結果 · ${rec["身份"]}${curAudience==="gen"?"":" · "+rec["難度"]}</span>
    <div class="score">
      <div class="n">${points}<small> 分</small></div>
      <div class="sub">${esc(rec["姓名"])}｜答對 ${correctCount}／${order.length} 題｜作答 ${rec["作答秒數"]} 秒</div>
      <div class="rank">${r.rank}</div>
      <p style="margin-top:6px;font-size:14px;">${r.note}</p>
    </div>
    <ul class="review">
      ${list.map(({q,ok,g})=>`<li class="${ok?"ok":"ng"}">${ok?"✔":"✘"} ${q.tag}｜正解：${opts[q.ans]}${ok?`｜+${g} 分`:""}</li>`).join("")}
    </ul>
    <div class="record">
      <b>本次紀錄（將寫入 Google Sheet）</b><br>
      姓名：${esc(rec["姓名"])}｜編號：${esc(rec["員工號/身分證字號"])}｜身份：${rec["身份"]}<br>
      分數：${rec["分數"]}｜題數：${rec["題數"]}｜答對：${rec["答對題數"]}｜難度：${rec["難度"]}<br>
      作答時間：${rec["作答時間"]}（共 ${rec["作答秒數"]} 秒）｜版本：${rec["題庫版本"]}<br>
      答錯統計：${esc(rec["答錯統計"])}
    </div>
    <div class="btnrow">
      <button class="big-btn" id="uploadBtn" onclick="uploadRecord(this)" ${configured?"":"disabled"}>
        ${configured?"⬆ 上傳成績到 Google Sheet":"（尚未設定 Google Sheet 連結）"}
      </button>
      <button class="ghost-btn" onclick="downloadCSV()">⬇ 下載本場所有成績 CSV（${attempts.length} 筆）</button>
    </div>
    <div class="status" id="status"></div>
    <button class="big-btn" style="margin-top:16px" onclick="startGame('${curAudience}',${curLevel})">再挑戰一次</button>
    <button class="backbtn" onclick="renderStart()">← 換人／回選單</button>
  `;
  progress.hidden=true; hud.hidden=true;
  if(configured) uploadRecord(document.getElementById("uploadBtn"), rec, true);
}

let lastRecord=null;
async function uploadRecord(btn, rec, auto){
  const record = rec || lastRecord || attempts[attempts.length-1];
  lastRecord = record;
  const status=document.getElementById("status");
  if(!(SHEET_WEBAPP_URL && SHEET_WEBAPP_URL.indexOf("http")===0)){
    status.className="status err"; status.textContent="尚未設定上傳網址，請改用 CSV 下載。"; return;
  }
  status.className="status pending"; status.textContent="上傳中…";
  if(btn) btn.disabled=true;
  const body=new URLSearchParams({data:JSON.stringify(record)});
  try{
    const res=await fetch(SHEET_WEBAPP_URL,{method:"POST",body:body});
    const text=await res.text();
    let parsed=null;
    try{ parsed=JSON.parse(text); }catch(_){ parsed=null; }
    if(parsed && parsed.ok===true){
      status.className="status ok"; status.textContent="✔ 已成功寫入 Google Sheet";
      if(btn) btn.textContent="✔ 已上傳";
    }else if(parsed && parsed.ok===false){
      status.className="status err";
      status.textContent="✘ 伺服器回報失敗："+(parsed.error||"未知錯誤")+"　請改用 CSV 下載。";
      if(btn) btn.disabled=false;
    }else{
      status.className="status err";
      status.textContent="✘ 無法確認寫入。請確認：①部署權限為「任何人」②已重新部署新版本③已填 SPREADSHEET_ID。可先用 CSV 下載。";
      if(btn) btn.disabled=false;
    }
  }catch(err){
    try{
      await fetch(SHEET_WEBAPP_URL,{method:"POST",mode:"no-cors",body:body});
      status.className="status pending";
      status.textContent="⚠ 已送出，但無法確認結果，請至 Google Sheet 核對是否新增一列（或按下方 CSV 備份）。";
      if(btn) btn.textContent="已送出（請核對）";
    }catch(e2){
      status.className="status err";
      status.textContent="✘ 上傳失敗（無法連線）："+String(e2)+"　請改用 CSV 下載。";
      if(btn) btn.disabled=false;
    }
  }
}

function downloadCSV(){
  const rows=[COLS].concat(attempts.map(a=>COLS.map(c=>a[c])));
  const csv="\uFEFF"+rows.map(r=>r.map(v=>{
    const s=String(v==null?"":v);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`洗手時機成績_${fmtDateTime(new Date()).replace(/[: ]/g,"-")}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

renderStart();
</script>
